<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserTextEffects — Showroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/shared.css">
  <link rel="stylesheet" href="./css/nav.css">
  <link rel="stylesheet" href="./css/showroom.css">
  <script type="module" src="./js/nav.js"></script>
</head>
<body>
  <div class="panel-overlay" id="panel-overlay"></div>

  <!-- Showroom app-bar: sits below the shared nav, shows mobile toggles -->
  <header class="showroom-header">
    <button class="mobile-toggle" id="btn-sidebar-toggle" aria-label="Open effects list">☰</button>
    <div class="showroom-header-title">Showroom</div>
    <button class="mobile-toggle" id="btn-settings-toggle" aria-label="Open settings">⚙</button>
  </header>

  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-label">Effects</div>
    </aside>

    <main class="main">
      <div class="effect-title" id="effect-title">Waves</div>
      <div class="effect-desc" id="effect-desc">Characters animate in waves across the terminal.</div>
      <div class="preview-area">
        <div class="preview-pane text-pane">
          <div id="preview-text"></div>
        </div>
        <div class="preview-pane art-pane">
          <div id="preview-art"></div>
        </div>
      </div>
      <div class="controls">
        <button class="btn primary" id="btn-play">▶ Play</button>
        <button class="btn" id="btn-replay">↺ Replay</button>
      </div>
    </main>

    <aside class="settings-panel" id="settings">
      <div class="settings-label">Settings</div>
      <div id="settings-form"></div>
    </aside>
  </div>

  <script type="module">
    import {
      createEffect,
      defaultBeamsConfig,
      defaultBinaryPathConfig,
      defaultBlackholeConfig,
      defaultBouncyBallsConfig,
      defaultBubblesConfig,
      defaultBurnConfig,
      defaultColorShiftConfig,
      defaultCrumbleConfig,
      defaultDecryptConfig,
      defaultErrorCorrectConfig,
      defaultExpandConfig,
      defaultFireworksConfig,
      defaultHighlightConfig,
      defaultLaserEtchConfig,
      defaultMatrixConfig,
      defaultMiddleOutConfig,
      defaultOrbittingVolleyConfig,
      defaultOverflowConfig,
      defaultPourConfig,
      defaultPrintConfig,
      defaultRainConfig,
      defaultRandomSequenceConfig,
      defaultRingsConfig,
      defaultScatteredConfig,
      defaultSliceConfig,
      defaultSlideConfig,
      defaultSmokeConfig,
      defaultSpotlightsConfig,
      defaultSprayConfig,
      defaultSwarmConfig,
      defaultSweepConfig,
      defaultSynthGridConfig,
      defaultThunderstormConfig,
      defaultUnstableConfig,
      defaultVhstapeConfig,
      defaultWavesConfig,
      defaultWipeConfig,
    } from './lib/bte.js';

    const ART = [

    ].join("\n");

    const POEM = [
"",
"         ____",
"        |  _ \\                                 ",
"        | |_) |_ __ _____      _____  ___ _ __ ",
"        |  _ <| '__/ _ \\ \\ /\\ / / __|/ _ \\ '__|",
"        | |_) | | | (_) \\ V  V /\\__ \\  __/ |   ",
"        |____/|_|  \\___/ \\_/\\_/ |___/\\___|_|  ",
"                _______        _                      ",
"               |__   __|      | |                     ",
"                  | | _____  _| |_                    ",
"                  | |/ _ \\ \\/ / __|                   ",
"                  | |  __/>  <| |_                    ",
"                  |_|\\___/_/\\_\\\\__|                   ",
"          ______  __  __          _             ",
"         |  ____|/ _|/ _|        | |            ",
"         | |__  | |_| |_ ___  ___| |_ ___       ",
"         |  __| |  _|  _/ _ \\/ __| __/ __|      ",
"         | |____| | | ||  __/ (__| |_\\__ \\      ",
"         |______|_| |_| \\___|\\___|\\__|___/      ",
"",
"         -<>--<>--<>--<>--<>--<>--<>--<>-",
"",
"                Animate your text.",
"               Right in the browser.",
"          37 effects. Zero dependencies.",
"",
"         -<>--<>--<>--<>--<>--<>--<>--<>-",
"",
"               ___====-_  _-====___                 ",
"         _--^^^#####//      \\\\#####^^^--_          ",
"       -^##########// (    ) \\\\##########^-_      ",
"     -############//  |\\^^/|  \\\\############-      ",
"   _/############//   (@::@)   \\\\############\\_    ",
"  /#############((     \\\\//     ))#############\\   ",
" -###############\\\\    (oo)    //###############-  ",
" -################\\\\  / VV \\  //################-  ",
" -#################\\\\/      \\//#################-  ",
" _#/|##########/\\######(  )######/\\##########|\\#_ ",
" |/ |#/\\#/\\#/\\/  \\#/\\##\\  \\/##/\\#/  \\/\\#/\\#/\\#| \\|  ",
" `  |/  V  V  `   V  \\#\\| |/#/ V   '  V  V  \\|  '  ",
"    `   `  `      `   / | | \\   '      '  '   '    ",
"                     (  | |  )                     ",
"                    __\\ | | /__                    ",
"                   (vvv(VVV)vvv)                   ",
    ].join("\n");

    // ── Effect registry ───────────────────────────────────────────────────────
    const GRADIENT_DIRS = ['vertical', 'horizontal', 'radial', 'diagonal'];
    const WAVE_DIRS = ['column_left_to_right', 'column_right_to_left', 'row_top_to_bottom', 'row_bottom_to_top', 'center_to_outside', 'outside_to_center'];
    const SLIDE_DIRS = ['left', 'right', 'up', 'down', 'center'];
    const WIPE_DIRS = ['left_to_right', 'right_to_left', 'top_to_bottom', 'bottom_to_top', 'center'];
    const SWEEP_DIRS = ['left_to_right', 'right_to_left', 'top_to_bottom', 'bottom_to_top'];

    const EFFECTS = [
      {
        key: 'beams',
        label: 'Beams',
        desc: 'Beams of light sweep across the characters.',
        defaultConfig: defaultBeamsConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'binarypath',
        label: 'Binary Path',
        desc: 'Characters travel along binary-coded paths.',
        defaultConfig: defaultBinaryPathConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'blackhole',
        label: 'Blackhole',
        desc: 'Characters are pulled into a gravitational singularity.',
        defaultConfig: defaultBlackholeConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'bouncyballs',
        label: 'Bouncy Balls',
        desc: 'Characters fall as bouncy balls and settle into place.',
        defaultConfig: defaultBouncyBallsConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'bubbles',
        label: 'Bubbles',
        desc: 'Characters float up as bubbles and pop into place.',
        defaultConfig: defaultBubblesConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'burn',
        label: 'Burn',
        desc: 'Characters are revealed as if being burned onto the screen.',
        defaultConfig: defaultBurnConfig,
        enumFields: {},
      },
      {
        key: 'colorshift',
        label: 'Color Shift',
        desc: 'Characters shift through a gradient of colors.',
        defaultConfig: defaultColorShiftConfig,
        enumFields: { gradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'crumble',
        label: 'Crumble',
        desc: 'Characters crumble and fall before reforming.',
        defaultConfig: defaultCrumbleConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'decrypt',
        label: 'Decrypt',
        desc: 'Characters are decrypted from a random sequence.',
        defaultConfig: defaultDecryptConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'errorcorrect',
        label: 'Error Correct',
        desc: 'Characters appear with errors then self-correct.',
        defaultConfig: defaultErrorCorrectConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'expand',
        label: 'Expand',
        desc: 'Characters expand outward from the center.',
        defaultConfig: defaultExpandConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'fireworks',
        label: 'Fireworks',
        desc: 'Characters explode like fireworks and land in place.',
        defaultConfig: defaultFireworksConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'highlight',
        label: 'Highlight',
        desc: 'A highlight sweeps across the characters.',
        defaultConfig: defaultHighlightConfig,
        enumFields: { direction: SWEEP_DIRS },
      },
      {
        key: 'laseretch',
        label: 'Laser Etch',
        desc: 'A laser etches the characters onto the screen.',
        defaultConfig: defaultLaserEtchConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'matrix',
        label: 'Matrix',
        desc: 'Characters rain down in matrix-style columns.',
        defaultConfig: defaultMatrixConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'middleout',
        label: 'Middle Out',
        desc: 'Characters expand from the middle outward.',
        defaultConfig: defaultMiddleOutConfig,
        enumFields: { expandDirection: ['vertical', 'horizontal'] },
      },
      {
        key: 'orbittingvolley',
        label: 'Orbitting Volley',
        desc: 'Characters orbit and volley into position.',
        defaultConfig: defaultOrbittingVolleyConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'overflow',
        label: 'Overflow',
        desc: 'Characters overflow from the edges and settle.',
        defaultConfig: defaultOverflowConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'pour',
        label: 'Pour',
        desc: 'Characters pour in from the top like liquid.',
        defaultConfig: defaultPourConfig,
        enumFields: { pourDirection: ['down', 'up', 'left', 'right'] },
      },
      {
        key: 'print',
        label: 'Print',
        desc: 'Characters are printed one by one like a typewriter.',
        defaultConfig: defaultPrintConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'rain',
        label: 'Rain',
        desc: 'Characters fall like rain and settle into place.',
        defaultConfig: defaultRainConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'randomsequence',
        label: 'Random Sequence',
        desc: 'Characters appear in a random order.',
        defaultConfig: defaultRandomSequenceConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'rings',
        label: 'Rings',
        desc: 'Characters form concentric rings expanding outward.',
        defaultConfig: defaultRingsConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'scattered',
        label: 'Scattered',
        desc: 'Characters scatter then converge into place.',
        defaultConfig: defaultScatteredConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'slide',
        label: 'Slide',
        desc: 'Characters slide into position from one direction.',
        defaultConfig: defaultSlideConfig,
        enumFields: {
          slideDirection: SLIDE_DIRS,
          finalGradientDirection: GRADIENT_DIRS,
        },
      },
      {
        key: 'slice',
        label: 'Slice',
        desc: 'Rows slice into position from alternating sides.',
        defaultConfig: defaultSliceConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'smoke',
        label: 'Smoke',
        desc: 'Characters drift in like smoke and settle.',
        defaultConfig: defaultSmokeConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'spotlights',
        label: 'Spotlights',
        desc: 'Spotlights sweep across to reveal characters.',
        defaultConfig: defaultSpotlightsConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'spray',
        label: 'Spray',
        desc: 'Characters spray in from a point source.',
        defaultConfig: defaultSprayConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'swarm',
        label: 'Swarm',
        desc: 'Characters swarm together from random positions.',
        defaultConfig: defaultSwarmConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'sweep',
        label: 'Sweep',
        desc: 'Characters sweep in from one side.',
        defaultConfig: defaultSweepConfig,
        enumFields: {
          sweepDirection: SWEEP_DIRS,
          finalGradientDirection: GRADIENT_DIRS,
        },
      },
      {
        key: 'synthgrid',
        label: 'Synth Grid',
        desc: 'Characters emerge from a glowing grid pattern.',
        defaultConfig: defaultSynthGridConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'thunderstorm',
        label: 'Thunderstorm',
        desc: 'Lightning strikes reveal characters dramatically.',
        defaultConfig: defaultThunderstormConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'unstable',
        label: 'Unstable',
        desc: 'Characters flicker and shake before stabilizing.',
        defaultConfig: defaultUnstableConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'vhstape',
        label: 'VHS Tape',
        desc: 'Characters glitch and distort like a VHS tape.',
        defaultConfig: defaultVhstapeConfig,
        enumFields: { finalGradientDirection: GRADIENT_DIRS },
      },
      {
        key: 'waves',
        label: 'Waves',
        desc: 'Characters animate in waves across the terminal.',
        defaultConfig: defaultWavesConfig,
        enumFields: {
          waveDirection: WAVE_DIRS,
          finalGradientDirection: GRADIENT_DIRS,
        },
      },
      {
        key: 'wipe',
        label: 'Wipe',
        desc: 'Characters are wiped onto the screen.',
        defaultConfig: defaultWipeConfig,
        enumFields: {
          wipeDirection: WIPE_DIRS,
          finalGradientDirection: GRADIENT_DIRS,
        },
      },
    ];

    // ── State ─────────────────────────────────────────────────────────────────
    let currentHandleArt = null;
    let currentHandleText = null;
    const initialKey = new URLSearchParams(window.location.search).get('effect') || 'beams';
    let currentEffect = EFFECTS.find(e => e.key === initialKey) || EFFECTS[0];

    // ── DOM refs ──────────────────────────────────────────────────────────────
    const artEl = document.getElementById('preview-art');
    const textEl = document.getElementById('preview-text');
    const titleEl = document.getElementById('effect-title');
    const descEl = document.getElementById('effect-desc');
    const settingsFormEl = document.getElementById('settings-form');
    const sidebarEl = document.getElementById('sidebar');

    // ── Helpers ───────────────────────────────────────────────────────────────
    function hexToColor(hex) {
      return { rgbHex: hex.replace('#', '') };
    }

    function colorToHex(c) {
      return '#' + c.rgbHex.padStart(6, '0');
    }

    function getFieldType(key, value, enumFields) {
      if (enumFields && enumFields[key]) return 'enum';
      if (typeof value === 'number') return 'number';
      if (Array.isArray(value)) {
        if (value.length === 0) return 'string[]';
        if (typeof value[0] === 'string') return 'string[]';
        if (typeof value[0] === 'number') return 'number[]';
        if (typeof value[0] === 'object' && value[0] !== null && 'rgbHex' in value[0]) return 'Color[]';
        return 'string[]';
      }
      if (typeof value === 'object' && value !== null && 'rgbHex' in value) return 'Color';
      if (typeof value === 'string') return 'string';
      return 'unknown';
    }

    function camelToLabel(key) {
      return key
        .replace(/([A-Z])/g, ' $1')
        .replace(/^./, s => s.toUpperCase())
        .trim();
    }

    // ── Settings form ──────────────────────────────────────────────────────────
    function buildSettingsForm(effect) {
      settingsFormEl.replaceChildren();

      if (!effect.defaultConfig) {
        const empty = document.createElement('div');
        empty.className = 'settings-empty';
        empty.textContent = 'No settings available.';
        settingsFormEl.appendChild(empty);
        return;
      }

      for (const [key, defaultValue] of Object.entries(effect.defaultConfig)) {
        const type = getFieldType(key, defaultValue, effect.enumFields);
        if (type === 'unknown') continue;

        const group = document.createElement('div');
        group.className = 'field-group';

        const label = document.createElement('label');
        label.className = 'field-label';
        label.textContent = camelToLabel(key);
        label.setAttribute('for', 'field-' + key);
        group.appendChild(label);

        if (type === 'enum') {
          const select = document.createElement('select');
          select.className = 'field-input';
          select.id = 'field-' + key;
          select.dataset.fieldKey = key;
          select.dataset.fieldType = 'enum';
          for (const opt of effect.enumFields[key]) {
            const option = document.createElement('option');
            option.value = opt;
            option.textContent = opt.replace(/_/g, ' ');
            if (opt === defaultValue) option.selected = true;
            select.appendChild(option);
          }
          group.appendChild(select);

        } else if (type === 'number') {
          const input = document.createElement('input');
          input.type = 'number';
          input.className = 'field-input';
          input.id = 'field-' + key;
          input.dataset.fieldKey = key;
          input.dataset.fieldType = 'number';
          input.value = String(defaultValue);
          input.min = '0';
          input.step = '1';
          group.appendChild(input);

        } else if (type === 'string[]' || type === 'number[]') {
          const textarea = document.createElement('textarea');
          textarea.className = 'field-input';
          textarea.id = 'field-' + key;
          textarea.dataset.fieldKey = key;
          textarea.dataset.fieldType = type;
          textarea.value = defaultValue.join('\n');
          group.appendChild(textarea);

        } else if (type === 'Color') {
          const row = document.createElement('div');
          row.className = 'color-row';
          const colorInput = document.createElement('input');
          colorInput.type = 'color';
          colorInput.dataset.fieldKey = key;
          colorInput.dataset.fieldType = 'Color';
          colorInput.value = colorToHex(defaultValue);
          const hexSpan = document.createElement('input');
          hexSpan.className = 'color-hex field-input';
          hexSpan.readOnly = true;
          hexSpan.value = colorToHex(defaultValue);
          colorInput.addEventListener('input', () => {
            hexSpan.value = colorInput.value;
          });
          row.appendChild(colorInput);
          row.appendChild(hexSpan);
          group.appendChild(row);

        } else if (type === 'Color[]') {
          const list = document.createElement('div');
          list.className = 'color-list';
          list.dataset.fieldKey = key;
          list.dataset.fieldType = 'Color[]';
          for (let i = 0; i < defaultValue.length; i++) {
            const row = document.createElement('div');
            row.className = 'color-row';
            const colorInput = document.createElement('input');
            colorInput.type = 'color';
            colorInput.dataset.colorIndex = String(i);
            colorInput.value = colorToHex(defaultValue[i]);
            const hexSpan = document.createElement('input');
            hexSpan.className = 'color-hex field-input';
            hexSpan.readOnly = true;
            hexSpan.value = colorToHex(defaultValue[i]);
            colorInput.addEventListener('input', () => {
              hexSpan.value = colorInput.value;
            });
            row.appendChild(colorInput);
            row.appendChild(hexSpan);
            list.appendChild(row);
          }
          group.appendChild(list);
        }

        settingsFormEl.appendChild(group);
      }
    }

    // ── Read settings ──────────────────────────────────────────────────────────
    function readSettings() {
      const config = {};

      for (const el of settingsFormEl.querySelectorAll('[data-field-key]')) {
        const key = el.dataset.fieldKey;
        const type = el.dataset.fieldType;
        if (type === 'number') {
          config[key] = parseFloat(el.value) || 0;
        } else if (type === 'enum') {
          config[key] = el.value;
        } else if (type === 'string[]') {
          config[key] = el.value.split('\n').filter(s => s.length > 0);
        } else if (type === 'number[]') {
          config[key] = el.value.split('\n').filter(s => s.length > 0).map(Number);
        } else if (type === 'Color') {
          config[key] = hexToColor(el.closest('.field-group').querySelector('input[type="color"]').value);
        } else if (type === 'Color[]') {
          const pickers = el.querySelectorAll('input[type="color"]');
          config[key] = Array.from(pickers).map(p => hexToColor(p.value));
        }
      }

      return config;
    }

    // ── Run effect ─────────────────────────────────────────────────────────────
    function runEffect(effectDef) {
      currentHandleArt?.stop();
      currentHandleText?.stop();
      artEl.replaceChildren();
      textEl.replaceChildren();

      const config = readSettings();
      currentHandleArt = createEffect(artEl, ART, effectDef.key, config);
      currentHandleText = createEffect(textEl, POEM, effectDef.key, config);
      currentHandleArt.start();
      currentHandleText.start();
    }

    // ── Select effect ──────────────────────────────────────────────────────────
    function selectEffect(effectDef) {
      currentEffect = effectDef;

      for (const item of sidebarEl.querySelectorAll('.sidebar-item')) {
        item.classList.toggle('active', item.dataset.effectKey === effectDef.key);
      }

      const url = new URL(window.location.href);
      url.searchParams.set('effect', effectDef.key);
      history.replaceState(null, '', url);

      titleEl.textContent = effectDef.label;
      descEl.textContent = effectDef.desc;

      buildSettingsForm(effectDef);
      runEffect(effectDef);
    }

    // ── Build sidebar ──────────────────────────────────────────────────────────
    function buildSidebar() {
      for (const effectDef of EFFECTS) {
        const item = document.createElement('div');
        item.className = 'sidebar-item';
        item.dataset.effectKey = effectDef.key;
        item.textContent = effectDef.label;
        item.addEventListener('click', () => selectEffect(effectDef));
        sidebarEl.appendChild(item);
      }
    }

    // ── Controls ───────────────────────────────────────────────────────────────
    document.getElementById('btn-play').addEventListener('click', () => {
      if (currentEffect) runEffect(currentEffect);
    });

    document.getElementById('btn-replay').addEventListener('click', () => {
      if (currentEffect) runEffect(currentEffect);
    });

    // ── Init ───────────────────────────────────────────────────────────────────
    buildSidebar();
    selectEffect(currentEffect);

    // ── Mobile panel toggles ───────────────────────────────────────────────────
    (function () {
      const overlay     = document.getElementById('panel-overlay');
      const btnSidebar  = document.getElementById('btn-sidebar-toggle');
      const btnSettings = document.getElementById('btn-settings-toggle');

      function openPanel(panel) {
        panel.classList.add('open');
        overlay.classList.add('active');
      }
      function closeAll() {
        sidebarEl.classList.remove('open');
        document.getElementById('settings').classList.remove('open');
        overlay.classList.remove('active');
      }

      btnSidebar.addEventListener('click', () =>
        sidebarEl.classList.contains('open') ? closeAll() : (closeAll(), openPanel(sidebarEl))
      );
      btnSettings.addEventListener('click', () => {
        const s = document.getElementById('settings');
        s.classList.contains('open') ? closeAll() : (closeAll(), openPanel(s));
      });

      overlay.addEventListener('click', closeAll);

      sidebarEl.addEventListener('click', e => {
        if (e.target.classList.contains('sidebar-item')) closeAll();
      });
    })();
  </script>
</body>
</html>
