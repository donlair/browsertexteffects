<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BrowserTextEffects Showroom</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    header .logo {
      font-size: 15px;
      font-weight: bold;
      color: #58a6ff;
      letter-spacing: 1px;
    }
    header a {
      color: #8b949e;
      text-decoration: none;
      font-size: 13px;
      transition: color 0.15s;
    }
    header a:hover { color: #e6edf3; }

    /* ── Layout ── */
    .layout {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 190px;
      background: #161b22;
      border-right: 1px solid #30363d;
      overflow-y: auto;
      flex-shrink: 0;
    }
    .sidebar-label {
      padding: 10px 14px 6px;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #484f58;
    }
    .sidebar-item {
      padding: 7px 14px;
      cursor: pointer;
      color: #8b949e;
      font-size: 13px;
      border-left: 2px solid transparent;
      transition: background 0.1s, color 0.1s;
    }
    .sidebar-item:hover {
      background: #21262d;
      color: #e6edf3;
    }
    .sidebar-item.active {
      color: #58a6ff;
      background: #21262d;
      border-left-color: #58a6ff;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 16px 20px;
      overflow: hidden;
      min-width: 0;
    }
    .effect-title {
      font-size: 28px;
      font-weight: bold;
      color: #e6edf3;
      margin-bottom: 4px;
    }
    .effect-desc {
      font-size: 18px;
      color: #8b949e;
      margin-bottom: 12px;
    }
    .preview-area {
      background: #010409;
      border: 1px solid #30363d;
      border-radius: 6px;
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      position: relative;
      min-height: 0;
    }
    .preview-pane {
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 16px;
      overflow: auto;
      flex-shrink: 0;
    }
    .art-pane {
      flex: 0 0 auto;
      max-width: 58%;
      align-items: center;
      justify-content: flex-start;
    }
    .text-pane {
      flex: 1 1 0;
      align-items: center;
      justify-content: center;
    }
    .preview-divider {
      display: none;
    }
    #preview-art {
      font-family: monospace;
      font-size: 9px;
      line-height: 1.0;
      white-space: pre;
    }
    #preview-text {
      font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
      font-size: 16px;
      line-height: 1.5;
      white-space: pre;
    }
    .controls {
      padding: 12px 0 0;
      display: flex;
      gap: 8px;
    }
    .btn {
      background: #21262d;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 7px 16px;
      font-family: inherit;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn:hover {
      background: #30363d;
      border-color: #58a6ff;
    }
    .btn.primary {
      background: #1f6feb;
      border-color: #1f6feb;
    }
    .btn.primary:hover {
      background: #388bfd;
      border-color: #388bfd;
    }

    /* ── Settings Panel ── */
    .settings-panel {
      width: 250px;
      background: #161b22;
      border-left: 1px solid #30363d;
      overflow-y: auto;
      flex-shrink: 0;
      padding: 14px 14px;
    }
    .settings-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #484f58;
      margin-bottom: 12px;
    }
    .field-group {
      margin-bottom: 14px;
    }
    .field-label {
      font-size: 11px;
      color: #8b949e;
      margin-bottom: 4px;
      display: block;
    }
    .field-input {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #e6edf3;
      font-family: inherit;
      font-size: 12px;
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus {
      border-color: #58a6ff;
    }
    select.field-input {
      cursor: pointer;
    }
    textarea.field-input {
      resize: vertical;
      min-height: 60px;
    }
    .color-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .color-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .color-row input[type="color"] {
      width: 32px;
      height: 26px;
      border: 1px solid #30363d;
      border-radius: 4px;
      background: #0d1117;
      cursor: pointer;
      padding: 1px;
    }
    .color-row .color-hex {
      flex: 1;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 4px;
      color: #8b949e;
      font-family: inherit;
      font-size: 11px;
      padding: 4px 6px;
      width: 0;
    }
    .settings-empty {
      color: #484f58;
      font-size: 12px;
      text-align: center;
      padding: 20px 0;
    }
    .section-divider {
      border: none;
      border-top: 1px solid #21262d;
      margin: 12px 0;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }

    /* ── Mobile toggle buttons (desktop: hidden) ── */
    .mobile-toggle {
      display: none;
      background: none;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #8b949e;
      font-size: 18px;
      line-height: 1;
      padding: 6px 10px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      min-width: 36px;
    }
    .mobile-toggle:hover { color: #e6edf3; border-color: #58a6ff; }

    /* ── Overlay backdrop ── */
    .panel-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 10;
    }
    .panel-overlay.active { display: block; }

    /* ── Mobile breakpoint ── */
    @media (max-width: 767px) {

      /* Show toggle buttons */
      .mobile-toggle { display: inline-flex; align-items: center; justify-content: center; }

      /* Header: 3-col grid so toggles flank the logo */
      header {
        display: grid;
        grid-template-columns: 44px 1fr 44px;
        align-items: center;
        gap: 8px;
        padding: 10px 12px;
      }
      header .logo { text-align: center; }
      header .github-link { display: none; }

      /* Sidebar slides in from left */
      .sidebar {
        position: fixed;
        top: 0; left: 0;
        height: 100%;
        width: 240px;
        z-index: 20;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }
      .sidebar.open { transform: translateX(0); }

      /* Settings panel slides in from right */
      .settings-panel {
        position: fixed;
        top: 0; right: 0;
        height: 100%;
        width: 280px;
        z-index: 20;
        transform: translateX(100%);
        transition: transform 0.25s ease;
      }
      .settings-panel.open { transform: translateX(0); }

      /* Main fills full width */
      .main { padding: 12px; }

      /* Hide art pane; text pane fills width */
      .art-pane { display: none; }
      .text-pane { flex: 1 1 100%; }
    }
  </style>
</head>

    <aside class="settings-panel" id="settings">

    function getFieldType(key, value, enumFields) {
      if (enumFields && enumFields[key]) return 'enum';
      if (typeof value === 'number') return 'number';
      if (Array.isArray(value)) {
        if (value.length === 0) return 'string[]';
        if (typeof value[0] === 'string') return 'string[]';
        if (typeof value[0] === 'number') return 'number[]';
        if (typeof value[0] === 'object' && value[0] !== null && 'rgbHex' in value[0]) return 'Color[]';
        return 'string[]';
      }
      if (typeof value === 'object' && value !== null && 'rgbHex' in value) return 'Color';
      if (typeof value === 'string') return 'string';
      return 'unknown';
    }

    function camelToLabel(key) {
      return key
        .replace(/([A-Z])/g, ' $1')
        .replace(/^./, s => s.toUpperCase())
        .trim();
    }

    // ── Settings form ─────────────────────────────────────────────────────────
    function buildSettingsForm(effect) {
      settingsFormEl.replaceChildren();

      if (!effect.defaultConfig) {
        const empty = document.createElement('div');
        empty.className = 'settings-empty';
        empty.textContent = 'No settings available.';
        settingsFormEl.appendChild(empty);
        return;
      }

      for (const [key, defaultValue] of Object.entries(effect.defaultConfig)) {
        const type = getFieldType(key, defaultValue, effect.enumFields);
        if (type === 'unknown') continue;

        const group = document.createElement('div');
        group.className = 'field-group';

        const label = document.createElement('label');
        label.className = 'field-label';
        label.textContent = camelToLabel(key);
        label.setAttribute('for', 'field-' + key);
        group.appendChild(label);

        if (type === 'enum') {
          const select = document.createElement('select');
          select.className = 'field-input';
          select.id = 'field-' + key;
          select.dataset.fieldKey = key;
          select.dataset.fieldType = 'enum';
          for (const opt of effect.enumFields[key]) {
            const option = document.createElement('option');
            option.value = opt;
            option.textContent = opt.replace(/_/g, ' ');
            if (opt === defaultValue) option.selected = true;
            select.appendChild(option);
          }
          group.appendChild(select);

        } else if (type === 'number') {
          const input = document.createElement('input');
          input.type = 'number';
          input.className = 'field-input';
          input.id = 'field-' + key;
          input.dataset.fieldKey = key;
          input.dataset.fieldType = 'number';
          input.value = String(defaultValue);
          input.min = '0';
          input.step = '1';
          group.appendChild(input);

        } else if (type === 'string[]' || type === 'number[]') {
          const textarea = document.createElement('textarea');
          textarea.className = 'field-input';
          textarea.id = 'field-' + key;
          textarea.dataset.fieldKey = key;
          textarea.dataset.fieldType = type;
          textarea.value = defaultValue.join('\n');
          group.appendChild(textarea);

        } else if (type === 'Color') {
          const row = document.createElement('div');
          row.className = 'color-row';
          const colorInput = document.createElement('input');
          colorInput.type = 'color';
          colorInput.dataset.fieldKey = key;
          colorInput.dataset.fieldType = 'Color';
          colorInput.value = colorToHex(defaultValue);
          const hexSpan = document.createElement('input');
          hexSpan.className = 'color-hex field-input';
          hexSpan.readOnly = true;
          hexSpan.value = colorToHex(defaultValue);
          colorInput.addEventListener('input', () => {
            hexSpan.value = colorInput.value;
          });
          row.appendChild(colorInput);
          row.appendChild(hexSpan);
          group.appendChild(row);

        } else if (type === 'Color[]') {
          const list = document.createElement('div');
          list.className = 'color-list';
          list.dataset.fieldKey = key;
          list.dataset.fieldType = 'Color[]';
          for (let i = 0; i < defaultValue.length; i++) {
            const row = document.createElement('div');
            row.className = 'color-row';
            const colorInput = document.createElement('input');
            colorInput.type = 'color';
            colorInput.dataset.colorIndex = String(i);
            colorInput.value = colorToHex(defaultValue[i]);
            const hexSpan = document.createElement('input');
            hexSpan.className = 'color-hex field-input';
            hexSpan.readOnly = true;
            hexSpan.value = colorToHex(defaultValue[i]);
            colorInput.addEventListener('input', () => {
              hexSpan.value = colorInput.value;
            });
            row.appendChild(colorInput);
            row.appendChild(hexSpan);
            list.appendChild(row);
          }
          group.appendChild(list);
        }

        settingsFormEl.appendChild(group);
      }
    }

    // ── Read settings ─────────────────────────────────────────────────────────
    function readSettings() {
      const config = {};

      // number and enum fields
      for (const el of settingsFormEl.querySelectorAll('[data-field-key]')) {
        const key = el.dataset.fieldKey;
        const type = el.dataset.fieldType;
        if (type === 'number') {
          config[key] = parseFloat(el.value) || 0;
        } else if (type === 'enum') {
          config[key] = el.value;
        } else if (type === 'string[]') {
          config[key] = el.value.split('\n').filter(s => s.length > 0);
        } else if (type === 'number[]') {
          config[key] = el.value.split('\n').filter(s => s.length > 0).map(Number);
        } else if (type === 'Color') {
          config[key] = hexToColor(el.closest('.field-group').querySelector('input[type="color"]').value);
        } else if (type === 'Color[]') {
          const pickers = el.querySelectorAll('input[type="color"]');
          config[key] = Array.from(pickers).map(p => hexToColor(p.value));
        }
      }

      return config;
    }

    // ── Run effect ────────────────────────────────────────────────────────────
    function runEffect(effectDef) {
      currentHandleArt?.stop();
      currentHandleText?.stop();
      artEl.replaceChildren();
      textEl.replaceChildren();

      const config = readSettings();
      currentHandleArt = createEffect(artEl, ART, effectDef.key, config);
      currentHandleText = createEffect(textEl, POEM, effectDef.key, config);
      currentHandleArt.start();
      currentHandleText.start();
    }

    // ── Select effect ─────────────────────────────────────────────────────────
    function selectEffect(effectDef) {
      currentEffect = effectDef;

      // Update sidebar active state
      for (const item of sidebarEl.querySelectorAll('.sidebar-item')) {
        item.classList.toggle('active', item.dataset.effectKey === effectDef.key);
      }

      // Update title and desc
      titleEl.textContent = effectDef.label;
      descEl.textContent = effectDef.desc;

      // Rebuild settings form
      buildSettingsForm(effectDef);

      // Run the effect
      runEffect(effectDef);
    }

    // ── Build sidebar ─────────────────────────────────────────────────────────
    function buildSidebar() {
      for (const effectDef of EFFECTS) {
        const item = document.createElement('div');
        item.className = 'sidebar-item';
        item.dataset.effectKey = effectDef.key;
        item.textContent = effectDef.label;
        item.addEventListener('click', () => selectEffect(effectDef));
        sidebarEl.appendChild(item);
      }
    }

    // ── Controls ──────────────────────────────────────────────────────────────
    document.getElementById('btn-play').addEventListener('click', () => {
      if (currentEffect) runEffect(currentEffect);
    });

    document.getElementById('btn-replay').addEventListener('click', () => {
      if (currentEffect) runEffect(currentEffect);
    });

    // ── Init ──────────────────────────────────────────────────────────────────
    buildSidebar();
    selectEffect(currentEffect);

    // ── Mobile panel toggles ──────────────────────────────────────────
    (function () {
      const overlay      = document.getElementById('panel-overlay');
      const btnSidebar   = document.getElementById('btn-sidebar-toggle');
      const btnSettings  = document.getElementById('btn-settings-toggle');

      function openPanel(panel) {
        panel.classList.add('open');
        overlay.classList.add('active');
      }
      function closeAll() {
        sidebarEl.classList.remove('open');
        document.getElementById('settings').classList.remove('open');
        overlay.classList.remove('active');
      }

      btnSidebar.addEventListener('click', () =>
        sidebarEl.classList.contains('open') ? closeAll() : (closeAll(), openPanel(sidebarEl))
      );
      btnSettings.addEventListener('click', () => {
        const s = document.getElementById('settings');
        s.classList.contains('open') ? closeAll() : (closeAll(), openPanel(s));
      });

      overlay.addEventListener('click', closeAll);

      // Auto-close sidebar when an effect is selected
      sidebarEl.addEventListener('click', e => {
        if (e.target.classList.contains('sidebar-item')) closeAll();
      });
    })();
  </script>
</body>
</html>
