<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TTE-JS — ANSI Art Animations</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #fff; font-family: system-ui, sans-serif; padding: 20px; }
h1 { font-size: 14px; color: #555; text-align: center; margin: 20px 0 30px; letter-spacing: 4px; text-transform: uppercase; }
.section {
  margin: 30px auto; padding: 20px;
  border: 1px solid #1a1a1a; border-radius: 12px; background: #0d0d0d;
  overflow-x: auto; max-width: 1400px;
}
.section h2 {
  font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
  margin-bottom: 14px; padding-bottom: 8px; border-bottom: 1px solid #1a1a1a;
}
.effect-box { font-size: 10px; line-height: 1.08; }
.controls { margin-top: 12px; display: flex; gap: 8px; }
.controls button {
  background: #1a1a1a; color: #aaa; border: 1px solid #333; border-radius: 6px;
  padding: 6px 16px; cursor: pointer; font-size: 11px; letter-spacing: 1px; text-transform: uppercase;
  transition: all 0.2s;
}
.controls button:hover { background: #2a2a2a; color: #fff; border-color: #555; }
.controls button.active { background: #333; color: #fff; border-color: #666; }
</style>
</head>
<body>
<h1>TTE-JS &mdash; ANSI Art Animations</h1>

<div class="section">
  <h2 style="color:#ff6b35">Decrypt Effect &mdash; Sunset</h2>
  <div id="decrypt-sunset" class="effect-box"></div>
  <div class="controls">
    <button onclick="startEffect('decrypt-sunset')">Replay</button>
  </div>
</div>

<div class="section">
  <h2 style="color:#00ffff">Slide (Row) &mdash; Cyberpunk</h2>
  <div id="slide-row" class="effect-box"></div>
  <div class="controls">
    <button onclick="startEffect('slide-row')">Replay</button>
  </div>
</div>

<div class="section">
  <h2 style="color:#00ff41">Slide (Column) &mdash; Matrix</h2>
  <div id="slide-col" class="effect-box"></div>
  <div class="controls">
    <button onclick="startEffect('slide-col')">Replay</button>
  </div>
</div>

<div class="section">
  <h2 style="color:#ff71ce">Decrypt &mdash; Vaporwave</h2>
  <div id="decrypt-vapor" class="effect-box"></div>
  <div class="controls">
    <button onclick="startEffect('decrypt-vapor')">Replay</button>
  </div>
</div>

<div class="section">
  <h2 style="color:#4fc3f7">Slide (Diagonal) &mdash; Ocean</h2>
  <div id="slide-diag" class="effect-box"></div>
  <div class="controls">
    <button onclick="startEffect('slide-diag')">Replay</button>
  </div>
</div>

<div class="section">
  <h2 style="color:#ff4500">Slide (Row, Merge) &mdash; Inferno</h2>
  <div id="slide-merge" class="effect-box"></div>
  <div class="controls">
    <button onclick="startEffect('slide-merge')">Replay</button>
  </div>
</div>

<script type="module">
import { createEffect, color, easing } from './dist/index.js';

// The ANSI art from streaming_text_colorful_v2.html
const ART = [
  "   \u2584\u2588\u2588\u2588\u2588\u2588\u2588\u2588     \u2588\u2588\u2588        \u2584\u2588\u2588\u2588\u2588\u2588\u2588\u2588    \u2584\u2588\u2588\u2588\u2588\u2588\u2588\u2588    \u2584\u2588\u2588\u2588\u2588\u2588\u2588\u2588   \u2584\u2584\u2584\u2584\u2588\u2588\u2588\u2584\u2584\u2584\u2584    \u2584\u2588  \u2588\u2588\u2588\u2584\u2584\u2584\u2584      \u2584\u2588\u2588\u2588\u2588\u2588\u2588\u2584 ",
  " \u2588\u2588\u2588    \u2588\u2588\u2588 \u2580\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2584   \u2588\u2588\u2588    \u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2588\u2588 \u2584\u2588\u2588\u2580\u2580\u2580\u2588\u2588\u2588\u2580\u2580\u2580\u2588\u2588\u2584 \u2588\u2588\u2588  \u2588\u2588\u2588\u2580\u2580\u2580\u2588\u2588\u2584   \u2588\u2588\u2588    \u2588\u2588\u2588",
  " \u2588\u2588\u2588    \u2588\u2580     \u2580\u2588\u2588\u2588\u2580\u2580\u2588\u2588   \u2588\u2588\u2588    \u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2580    \u2588\u2588\u2588    \u2588\u2588\u2588 \u2588\u2588\u2588   \u2588\u2588\u2588   \u2588\u2588\u2588 \u2588\u2588\u2588\u258c \u2588\u2588\u2588   \u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2580 ",
  " \u2588\u2588\u2588            \u2588\u2588\u2588   \u2580  \u2584\u2588\u2588\u2588\u2584\u2584\u2584\u2584\u2588\u2588\u2580  \u2584\u2588\u2588\u2588\u2584\u2584\u2584       \u2588\u2588\u2588    \u2588\u2588\u2588 \u2588\u2588\u2588   \u2588\u2588\u2588   \u2588\u2588\u2588 \u2588\u2588\u2588\u258c \u2588\u2588\u2588   \u2588\u2588\u2588  \u2584\u2588\u2588\u2588      ",
  " \u2580\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588     \u2588\u2588\u2588     \u2580\u2580\u2588\u2588\u2588\u2580\u2580\u2580\u2580\u2580   \u2580\u2580\u2588\u2588\u2588\u2580\u2580\u2580     \u2580\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588   \u2588\u2588\u2588   \u2588\u2588\u2588 \u2588\u2588\u2588\u258c \u2588\u2588\u2588   \u2588\u2588\u2588 \u2580\u2580\u2588\u2588\u2588 \u2588\u2588\u2588\u2588\u2584",
  "          \u2588\u2588\u2588     \u2588\u2588\u2588     \u2580\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2584    \u2588\u2588\u2588    \u2588\u2588\u2588 \u2588\u2588\u2588   \u2588\u2588\u2588   \u2588\u2588\u2588 \u2588\u2588\u2588  \u2588\u2588\u2588   \u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2588\u2588",
  "    \u2584\u2588    \u2588\u2588\u2588     \u2588\u2588\u2588       \u2588\u2588\u2588    \u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2588\u2588 \u2588\u2588\u2588   \u2588\u2588\u2588   \u2588\u2588\u2588 \u2588\u2588\u2588  \u2588\u2588\u2588   \u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2588\u2588",
  " \u2584\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2580     \u2584\u2588\u2588\u2588\u2588\u2580     \u2588\u2588\u2588    \u2588\u2588\u2588   \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588   \u2588\u2588\u2588    \u2588\u2580   \u2580\u2588   \u2588\u2588\u2588   \u2588\u2580  \u2588\u2580    \u2580\u2588   \u2588\u2580    \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2580 ",
  "                            \u2588\u2588\u2588    \u2588\u2588\u2588                                                                      ",
  "",
  "                  \u2588\u2588\u2588        \u2584\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \u2580\u2588\u2588\u2588\u2588    \u2590\u2588\u2588\u2588\u2588\u2580     \u2588\u2588\u2588                                              ",
  "              \u2580\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2584   \u2588\u2588\u2588    \u2588\u2588\u2588   \u2588\u2588\u2588\u258c   \u2588\u2588\u2588\u2588\u2580  \u2580\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2584                                         ",
  "                 \u2580\u2588\u2588\u2588\u2580\u2580\u2588\u2588   \u2588\u2588\u2588    \u2588\u2580     \u2588\u2588\u2588  \u2590\u2588\u2588\u2588       \u2580\u2588\u2588\u2588\u2580\u2580\u2588\u2588                                         ",
  "                  \u2588\u2588\u2588   \u2580  \u2584\u2588\u2588\u2588\u2584\u2584\u2584        \u2580\u2588\u2588\u2588\u2584\u2588\u2588\u2588\u2580        \u2588\u2588\u2588   \u2580                                         ",
  "                  \u2588\u2588\u2588     \u2580\u2580\u2588\u2588\u2588\u2580\u2580\u2580        \u2588\u2588\u2588\u2588\u2580\u2588\u2588\u2584         \u2588\u2588\u2588                                              ",
  "                  \u2588\u2588\u2588       \u2588\u2588\u2588    \u2588\u2584    \u2590\u2588\u2588\u2588  \u2580\u2588\u2588\u2588        \u2588\u2588\u2588                                              ",
  "                  \u2588\u2588\u2588       \u2588\u2588\u2588    \u2588\u2588\u2588  \u2584\u2588\u2588\u2588     \u2588\u2588\u2588\u2584      \u2588\u2588\u2588                                              ",
  "                 \u2584\u2588\u2588\u2588\u2588\u2580     \u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588\u2588 \u2588\u2588\u2588\u2588       \u2588\u2588\u2588\u2584    \u2584\u2588\u2588\u2588\u2588\u2580                                           ",
].join("\n");

const effects = {};

function createAndStore(id, effectName, config) {
  const container = document.getElementById(id);
  const handle = createEffect(container, ART, effectName, config);
  effects[id] = { container, effectName, config, handle };
  return handle;
}

// Decrypt — Sunset
createAndStore('decrypt-sunset', 'decrypt', {
  typingSpeed: 4,
  ciphertextColors: [color('ff1744'), color('ff5722'), color('ff9800'), color('ffc107')],
  finalGradientStops: [color('ff6b35'), color('ffc107'), color('ff1744')],
  finalGradientSteps: 8,
  finalGradientDirection: 'horizontal',
}).start();

// Slide Row — Cyberpunk
createAndStore('slide-row', 'slide', {
  grouping: 'row',
  movementSpeed: 0.5,
  gap: 1,
  finalGradientStops: [color('00e5ff'), color('651fff'), color('d500f9'), color('ff4081')],
  finalGradientSteps: 10,
  finalGradientDirection: 'diagonal',
}).start();

// Slide Column — Matrix
createAndStore('slide-col', 'slide', {
  grouping: 'column',
  movementSpeed: 0.6,
  gap: 0,
  reverseDirection: true,
  finalGradientStops: [color('b9f6ca'), color('00e676'), color('2e7d32')],
  finalGradientSteps: 10,
  finalGradientDirection: 'vertical',
}).start();

// Decrypt — Vaporwave
createAndStore('decrypt-vapor', 'decrypt', {
  typingSpeed: 6,
  ciphertextColors: [color('ff71ce'), color('d388ff'), color('7c4dff'), color('18ffff')],
  finalGradientStops: [color('ff71ce'), color('7c4dff'), color('18ffff')],
  finalGradientSteps: 10,
  finalGradientDirection: 'horizontal',
}).start();

// Slide Diagonal — Ocean
createAndStore('slide-diag', 'slide', {
  grouping: 'diagonal',
  movementSpeed: 0.4,
  gap: 0,
  finalGradientStops: [color('e0f7fa'), color('26c6da'), color('00695c')],
  finalGradientSteps: 10,
  finalGradientDirection: 'diagonal',
}).start();

// Slide Merge — Inferno
createAndStore('slide-merge', 'slide', {
  grouping: 'row',
  movementSpeed: 0.5,
  gap: 1,
  merge: true,
  finalGradientStops: [color('b71c1c'), color('ff5722'), color('ffc107'), color('ffeb3b')],
  finalGradientSteps: 10,
  finalGradientDirection: 'vertical',
}).start();

// Expose replay function
window.startEffect = function(id) {
  const e = effects[id];
  if (!e) return;
  e.handle.stop();
  // Re-create the effect fresh
  const handle = createEffect(e.container, ART, e.effectName, e.config);
  effects[id].handle = handle;
  handle.start();
};
</script>
</body>
</html>
