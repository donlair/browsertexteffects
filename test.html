<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TTE-JS Test</title>
  <style>
    body {
      background: #1a1a2e;
      color: #eee;
      font-family: system-ui, sans-serif;
      padding: 40px;
    }
    h1 { color: #e94560; }
    h2 { color: #0f3460; background: #e94560; display: inline-block; padding: 4px 12px; border-radius: 4px; }
    .effect-container {
      background: #0f0f23;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      min-height: 60px;
    }
    .spacer { height: 100vh; display: flex; align-items: center; justify-content: center; }
    .spacer p { font-size: 1.5rem; opacity: 0.5; }
  </style>
</head>
<body>
  <h1>TTE-JS: Terminal Text Effects for the Web</h1>

  <h2>Decrypt Effect</h2>
  <div id="decrypt-container" class="effect-container"></div>

  <h2>Slide Effect (Row)</h2>
  <div id="slide-row-container" class="effect-container"></div>

  <h2>Slide Effect (Column)</h2>
  <div id="slide-col-container" class="effect-container"></div>

  <div class="spacer">
    <p>Scroll down to trigger the next effect...</p>
  </div>

  <h2>Decrypt (Scroll Trigger)</h2>
  <div id="decrypt-scroll" class="effect-container"></div>

  <div class="spacer">
    <p>Keep scrolling...</p>
  </div>

  <h2>Slide Diagonal (Scroll Trigger)</h2>
  <div id="slide-scroll" class="effect-container"></div>

  <script type="module">
    import { createEffect, createEffectOnScroll, color, easing } from './dist/index.js';

    const sampleText = `Hello, World!
This is TTE-JS
Terminal Text Effects
Ported to JavaScript`;

    // Decrypt — starts immediately
    const d = createEffect(
      document.getElementById('decrypt-container'),
      sampleText,
      'decrypt',
    );
    d.start();

    // Slide row — starts immediately
    const s1 = createEffect(
      document.getElementById('slide-row-container'),
      sampleText,
      'slide',
      { grouping: 'row', movementSpeed: 0.5 },
    );
    s1.start();

    // Slide column — starts immediately
    const s2 = createEffect(
      document.getElementById('slide-col-container'),
      sampleText,
      'slide',
      {
        grouping: 'column',
        movementSpeed: 0.6,
        finalGradientStops: [color('00ff87'), color('00d4ff')],
      },
    );
    s2.start();

    // Scroll-triggered effects
    createEffectOnScroll(
      document.getElementById('decrypt-scroll'),
      `Decrypting secrets...
The matrix has you
Follow the white rabbit`,
      'decrypt',
      {
        ciphertextColors: [color('ff0000'), color('ff4400'), color('ff8800')],
        finalGradientStops: [color('00ffaa'), color('00aaff')],
      },
    );

    createEffectOnScroll(
      document.getElementById('slide-scroll'),
      `Diagonal slide effect
Characters arrive from
the corner of the screen`,
      'slide',
      {
        grouping: 'diagonal',
        movementSpeed: 0.4,
        gap: 1,
        finalGradientStops: [color('ff6b6b'), color('ffd93d'), color('6bcb77')],
      },
    );
  </script>
</body>
</html>
